
<html></html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(135deg, #ff9a9e, #a05743);
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .container {
        text-align: center;
        color: white;
    }

    h1 {
        font-size: 80px;
        margin-bottom: 150px;
    }

    .heart {
        width: 150px;
        height: 150px;
        background: PINK;
        position: relative;
        transform: rotate(-45deg);
        margin: auto;
        cursor: pointer;
        animation: beat 1s infinite;
        box-shadow: 0 0 40px rgba(255,0,0,0.6);
    }

    .heart:before,
    .heart:after {
        content: "";
        width: 150px;
        height: 150px;
        background: pink;
        border-radius: 50%;
        position: absolute;
    }

    .heart:before {
        top: -75px;
        left: 0;
    }

    .heart:after {
        left: 75px;
        top: 0;
    }

    @keyframes beat {
        0%,100% {
            transform: rotate(-45deg) scale(1);
        }
        50% {
            transform: rotate(-45deg) scale(1.15);
        }
    }

    .message {
        margin-top: 70px;
        font-size: 22px;
        opacity: 0;
        transition: 1s;
    }

    .show {
        opacity: 1;
    }

    button {
        margin-top: 30px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #ff4d6d;
        font-size: 18px;
        cursor: pointer;
    }

    .floating-heart {
        position: absolute;
        color: pink;
        font-size: 25px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        from {
            transform: translateY(100vh);
            opacity: 1;
        }
        to {
            transform: translateY(-10vh);
            opacity: 0;
        }
    }
</style>
</head>

<body>

<div class="container">

    <h1>FOR YANNIEEEE</h1>

    <div class="heart" onclick="loveClick()"></div>

    <div class="message" id="message">
        CLICK THE HEARTTTTT
    </div>

    <button onclick="surprise()">Click Me bruh</button>

</div>


<script>

function loveClick(){
    document.getElementById("message").classList.add("show");

    for(let i = 0; i < 10; i++){
        createHeart();
    }
}


function createHeart(){
    let heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.animationDuration = (Math.random()*3+2)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}


function surprise(){
    alert("idk i was bored and like I hope you still love me");
}

setInterval(createHeart, 1000);

</script>

</body>
</html>
